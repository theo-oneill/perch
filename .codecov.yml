# Codecov configuration. See https://docs.codecov.com/docs/codecov-yaml.

coverage:
  status:
    project:
      default:
        # Overall coverage target for the project. Currently ~91%; this
        # target leaves comfortable breathing room for routine PRs that
        # touch hard-to-reach branches, only failing on a real regression.
        target: 80%
        threshold: 2%
    patch:
      default:
        # New code introduced by a PR should be reasonably covered, but
        # docs-only or pure-refactor PRs shouldn't fail the gate.
        target: 70%
        threshold: 5%

comment:
  layout: "diff, files"
  require_changes: true   # Codecov posts a PR comment only if coverage changed
