name: Run tests

on:
  push:
    branches:
    - main
    tags:
    - '*'
  pull_request:
  schedule:
    # run every Tuesday at 5am UTC
    - cron: '0 5 * * 2'
  workflow_dispatch:

jobs:
  test:
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@v2
    with:
      coverage: codecov
      envs: |
        - linux: build_docs
        - linux: py310-test
        - linux: py311-test
        - linux: py311-test-dev
        - linux: py312-test
        - linux: py313-test
        - linux: py313-test-cov
        - macos: py313-test-dev
        - windows: py313-test-dev
