[tox]
envlist =
    py{310,311,312,313}-test{,-dev,-cov,-oldestdeps}
    build_docs
    codestyle
requires =
    setuptools >= 30.3.0
    pip >= 19.3.1
    tox-uv

[testenv]
passenv = HOME,DISPLAY,LC_ALL,LC_CTYPE,ON_TRAVIS
changedir = .tmp/{envname}
description = run tests with pytest
uv_resolution =
    # The oldestdeps factor is intended to be used to install
    # the oldest versions of all dependencies
    oldestdeps: lowest-direct
deps =
    dev: numpy>=0.0.dev0
    dev: pyerfa>=0.0.dev0
    dev: astropy>=0.0.dev0
extras =
    test
    dev: dev
    cov: cov
    latest: latest
commands =
    {list_dependencies_command}
    !cov: pytest --pyargs perch {toxinidir}/docs {posargs}
    cov: pytest --pyargs perch {toxinidir}/docs --cov perch --cov-config={toxinidir}/pyproject.toml {posargs}
    cov: coverage xml -o {toxinidir}/coverage.xml
allowlist_externals =
    mkdir
    cp

[testenv:build_docs]
changedir =
    docs/source
description =
    invoke sphinx-build to build the HTML docs
extras =
    docs
commands =
    sphinx-build -W -b html . _build/html {posargs}

[testenv:codestyle]
deps = flake8
skip_install = true
commands =
    flake8 --max-line-length=100 perch
